<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly || 404 - Page Not Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    :root {
      --bg-primary: #0a0f0d;
      --accent: #00b894;
      --gradient: linear-gradient(135deg, #00b894, #00a389);
      --gradient-soft: linear-gradient(135deg, rgba(0,184,148,0.15), rgba(0,163,137,0.08));
      --text-primary: #ffffff;
      --text-secondary: #a8c4b8;
      --text-muted: #5d7a6d;
      --border-color: rgba(0, 184, 148, 0.12);
      --radius-md: 14px;
      --radius-xl: 28px;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --font: 'Outfit', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 184, 148, 0.08), transparent 70%);
      border-radius: 50%;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
    }
    .error-container {
      text-align: center;
      padding: 40px;
      position: relative;
      z-index: 2;
    }
    .error-icon {
      font-size: 5rem;
      color: var(--accent);
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .error-text {
      color: var(--text-secondary);
      font-size: 1.05rem;
      max-width: 450px;
      margin: 0 auto 30px;
      line-height: 1.6;
    }
    .error-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--gradient);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font);
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 184, 148, 0.3);
    }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font);
      text-decoration: none;
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .paw-prints {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      opacity: 0.2;
    }
    .paw-prints i {
      font-size: 1.5rem;
      color: var(--accent);
    }
    .brand-link {
      position: absolute;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      z-index: 10;
    }
    .brand-link img {
      height: 36px;
      border-radius: 6px;
    }
    .brand-link span {
      font-size: 1.2rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>

<a href="index.html" class="brand-link">
  <img src="images/logo.webp" alt="Stackly Logo">
  <span>Stackly</span>
</a>

<div class="error-container">
  <div class="error-icon"><i class="bi bi-paw"></i></div>
  <div class="error-code">404</div>
  <h1 class="error-title">Oops! Page Not Found</h1>
  <p class="error-text">Looks like this page has wandered off. Don't worry — even the best pets get lost sometimes! Let's get you back on track.</p>
  <div class="error-buttons">
    <a href="index.html" class="btn-primary">
      <i class="bi bi-house-door"></i> Back to Home
    </a>
    <a href="error.html" class="btn-secondary">
      <i class="bi bi-envelope"></i> Contact Support
    </a>
  </div>
</div>

<div class="paw-prints">
  <i class="bi bi-paw"></i>
  <i class="bi bi-paw" style="transform:rotate(15deg)"></i>
  <i class="bi bi-paw" style="transform:rotate(-10deg)"></i>
  <i class="bi bi-paw" style="transform:rotate(20deg)"></i>
  <i class="bi bi-paw" style="transform:rotate(-5deg)"></i>
</div>

</body>
</html>
