<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly || Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<a href="index.html" class="back-home">
  <i class="bi bi-arrow-left"></i> Back to Home
</a>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-icon">
      <i class="bi bi-paw"></i>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Join Stackly Pet Care and start your pet care journey</p>

    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="role">Register As</label>
        <select id="role" required>
          <option disabled selected>Select Role</option>
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="e.g. John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group">
          <input type="password" id="password" placeholder="Create a password" required>
          <button type="button" class="toggle-pw" onclick="togglePassword('password')">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-group">
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
          <button type="button" class="toggle-pw" onclick="togglePassword('confirm-password')">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-submit">
        <i class="bi bi-person-plus"></i> Create Account
      </button>

      <div class="auth-links">
        <a href="error.html">Need Help?</a>
        <a href="login.html" class="accent-link">Already have an account?</a>
      </div>
    </form>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
